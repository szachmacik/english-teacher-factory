name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Deploying english-teacher-factory → Coolify uuid=d0800oks0g4gws0kw04ck00s"
          curl -s -f -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=d0800oks0g4gws0kw04ck00s&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            && echo "✅ Deploy triggered" || echo "⚠️ Deploy trigger failed (non-critical)"
